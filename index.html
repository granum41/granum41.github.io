    <script>
        async function copyText(elementId) {
            const source = document.getElementById(elementId);
            if (!source) return;

            const text = source.textContent.trim();
            try {
                await navigator.clipboard.writeText(text);
            } catch (error) {
                const tempInput = document.createElement("textarea");
                tempInput.value = text;
                tempInput.setAttribute("readonly", "");
                tempInput.style.position = "absolute";
                tempInput.style.left = "-9999px";
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
            }
        }

        // Prefer iOS Calendar deep-linking so mobile browsers hand off to the Calendar app.
        (function setupAppleCalendarLink() {
            const link = document.getElementById("appleCalendarLink");
            if (!link) return;

            const icsUrl = "https://www.averygranum.com/vote-for-avery.ics?v=2";
            const webcalUrl = "webcal://www.averygranum.com/vote-for-avery.ics?v=2";

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            link.addEventListener(
                "click",
                () => {
                    // If we're on iOS, try opening the Calendar app via webcal://.
                    // Other platforms fall back to the plain .ics file.
                    link.href = isIOS ? webcalUrl : icsUrl;
                },
                { once: true }
            );
        })();
    </script>
